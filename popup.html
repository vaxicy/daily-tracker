<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>吃喝拉撒</title>
    <style>
      :root {
        --text: #0c2a4d;
        --muted: rgba(12,42,77,0.6);
        --primary: #0b6bff;
        --primary2: #20c6ff;
        --secondary: #8B5CF6;
        --secondary2: #A78BFA;
        --eat: #F59E0B;
        --eat2: #FBBF24;
        --pee: #10B981;
        --pee2: #34D399;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 320px;
        min-height: 480px;
        overflow-x: hidden;
        overflow-y: auto;
      }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system,
          "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(150deg, #eaf5ff 0%, #daeaff 100%);
        padding: 16px;
        padding-bottom: 50px;
        border: none;
        box-shadow: none;
        position: relative;
        z-index: 1;
      }

      /* 页面容器 */
      .page { 
        display: none; 
        padding-bottom: 0; 
        min-height: 340px; 
        position: relative;
        z-index: 1;
      }
      .page.active { display: block; }

      /* 底部导航 - 简洁圆点样式 */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: transparent;
        padding: 6px 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 24px;
        z-index: 90;
      }
      .nav-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(12,42,77,0.2);
        cursor: pointer;
        transition: all 0.25s;
      }
      .nav-dot:hover { background: rgba(12,42,77,0.35); }
      .nav-dot.active { transform: scale(1.3); }
      .nav-dot.active.eat { background: var(--eat); }
      .nav-dot.active.drink { background: var(--primary); }
      .nav-dot.active.poop { background: var(--secondary); }
      .nav-dot.active.pee { background: var(--pee); }

      /* ============ 吃 - 饮食记录 ============ */
      .eat-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .eat-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--eat), var(--eat2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        box-shadow: 0 4px 12px rgba(245,158,11,0.3);
      }
      .eat-title { font-size: 16px; font-weight: 700; }
      .eat-sub { font-size: 11px; color: var(--muted); }
      
      .card {
        background: rgba(255,255,255,0.7);
        border: 1px solid rgba(245,158,11,0.15);
        border-radius: 14px;
        padding: 14px;
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 16px rgba(245,158,11,0.1);
        margin-bottom: 12px;
      }
      
      .meal-input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      .meal-type-select {
        width: 80px;
        padding: 8px 10px;
        border-radius: 9px;
        border: 1px solid rgba(245,158,11,0.2);
        background: rgba(255,255,255,0.9);
        color: var(--text);
        font: inherit;
        font-size: 12px;
        outline: none;
        cursor: pointer;
      }
      .meal-input {
        flex: 1;
        padding: 8px 12px;
        border-radius: 9px;
        border: 1px solid rgba(245,158,11,0.2);
        background: rgba(255,255,255,0.9);
        color: var(--text);
        font: inherit;
        font-size: 13px;
        outline: none;
      }
      .meal-input:focus { border-color: var(--eat); }
      .meal-input::placeholder { color: var(--muted); }
      .btn-eat {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, var(--eat), var(--eat2));
        color: #fff;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(245,158,11,0.3);
        transition: all 0.2s;
      }
      .btn-eat:hover { transform: translateY(-1px); }
      
      .meal-records {
        max-height: 180px;
        overflow-y: auto;
        margin-top: 14px;
      }
      .meal-records-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(245,158,11,0.1);
        margin-bottom: 8px;
        cursor: pointer;
      }
      .meal-records-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .meal-toggle {
        font-size: 10px;
        color: var(--muted);
        transition: transform 0.2s;
      }
      .meal-toggle.collapsed { transform: rotate(-90deg); }
      .meal-records-list.collapsed { display: none; }
      .meal-item {
        display: flex;
        align-items: center;
        padding: 8px 10px;
        background: rgba(245,158,11,0.08);
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .meal-item:last-child { margin-bottom: 0; }
      .meal-type-tag {
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 600;
        margin-right: 8px;
        flex-shrink: 0;
      }
      .meal-type-tag.breakfast { background: rgba(251,191,36,0.2); color: #D97706; }
      .meal-type-tag.lunch { background: rgba(245,158,11,0.2); color: #B45309; }
      .meal-type-tag.dinner { background: rgba(217,119,6,0.2); color: #92400E; }
      .meal-type-tag.snack { background: rgba(180,83,9,0.15); color: #78350F; }
      .meal-content { flex: 1; color: var(--text); word-break: break-all; }
      .meal-time { font-size: 10px; color: var(--muted); margin-left: 8px; flex-shrink: 0; }

      .eat-stats {
        display: flex;
        gap: 10px;
      }
      .eat-stat-item {
        flex: 1;
        text-align: center;
        padding: 10px;
        background: rgba(245,158,11,0.08);
        border-radius: 10px;
      }
      .eat-stat-num { font-size: 20px; font-weight: 800; color: var(--eat); }
      .eat-stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

      /* ============ 喝 - 喝水提醒 ============ */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .cup-icon {
        font-size: 24px;
        animation: bob 2.6s ease-in-out infinite;
        line-height: 1;
      }
      @keyframes bob {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      .header-title { font-size: 15px; font-weight: 700; }
      .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

      .card.drink-card {
        border-color: rgba(11,107,255,0.12);
        box-shadow: 0 6px 24px rgba(11,107,255,0.1);
        padding: 14px;
      }
      .card-label { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 2px; }
      .timer {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: 1px;
        line-height: 1.05;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        transition: color 0.3s;
      }
      .timer.paused { color: rgba(12,42,77,0.35); }
      .next-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .progress-wrap {
        height: 5px;
        background: rgba(11,107,255,0.1);
        border-radius: 99px;
        margin-top: 10px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--primary), var(--primary2));
        transition: width 0.9s ease, opacity 0.3s;
      }
      .progress-bar.paused { opacity: 0.3; }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .row-label { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
      select {
        flex: 1;
        padding: 7px 9px;
        border-radius: 9px;
        border: 1px solid rgba(11,107,255,0.16);
        background: rgba(255,255,255,0.88);
        color: var(--text);
        outline: none;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .custom-row {
        display: none;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .custom-row.show { display: flex; }
      .custom-input {
        flex: 1;
        padding: 7px 9px;
        border-radius: 9px;
        border: 1px solid rgba(11,107,255,0.16);
        background: rgba(255,255,255,0.88);
        color: var(--text);
        outline: none;
        font: inherit;
        font-size: 12px;
      }
      .custom-unit {
        width: 76px;
        flex: 0 0 auto;
      }
      .custom-apply {
        width: 68px;
        flex: 0 0 auto;
        padding: 8px 10px;
        border-radius: 9px;
        font-weight: 800;
        font-size: 12px;
        background: linear-gradient(135deg, var(--primary), var(--primary2));
        color: #fff;
        box-shadow: 0 5px 16px rgba(11,107,255,0.25);
      }

      .btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }
      .drink-stats {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }
      .drink-stat-item {
        flex: 1;
        text-align: center;
        padding: 6px 8px;
        background: rgba(11,107,255,0.08);
        border-radius: 10px;
      }
      .drink-stat-num { font-size: 16px; font-weight: 800; color: var(--primary); }
      .drink-stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
      button { font: inherit; border: none; cursor: pointer; border-radius: 11px; padding: 10px 6px; font-weight: 700; font-size: 13px; transition: transform 100ms ease, opacity 100ms ease; }
      .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary2));
        color: #fff;
        box-shadow: 0 5px 16px rgba(11,107,255,0.3);
      }
      .btn-primary:hover  { transform: translateY(-1px); }
      .btn-primary:active { transform: translateY(1px); }
      .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }
      .btn-secondary {
        background: rgba(255,255,255,0.88);
        color: var(--text);
        border: 1px solid rgba(11,107,255,0.16);
        box-shadow: 0 3px 10px rgba(12,42,77,0.07);
      }
      .btn-secondary:disabled { opacity: 0.4; cursor: default; }

      .switch-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255,255,255,0.6);
        border: 1px solid rgba(11,107,255,0.1);
        border-radius: 11px;
        padding: 10px 14px;
        margin-bottom: 12px;
        gap: 10px;
      }
      .switch-item {
        display: flex;
        align-items: center;
        gap: 7px;
        flex: 1;
      }
      .switch-item:first-child {
        border-right: 1px solid rgba(11,107,255,0.1);
        padding-right: 12px;
        margin-right: 4px;
      }
      .switch-label { font-size: 12px; color: var(--text); white-space: nowrap; }
      .switch-sub { font-size: 10px; color: var(--muted); }

      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
        margin-left: auto;
      }
      .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
      .toggle-track {
        position: absolute;
        inset: 0;
        border-radius: 99px;
        background: rgba(12,42,77,0.18);
        transition: background 0.25s;
        cursor: pointer;
      }
      .toggle input:checked + .toggle-track { background: var(--primary); }
      .toggle-thumb {
        position: absolute;
        top: 3px; left: 3px;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        transition: transform 0.25s;
        pointer-events: none;
      }
      .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

      /* ============ 拉/撒 - 打卡页面样式 ============ */
      
      /* 日历 */
      .calendar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .calendar-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }
      .calendar-nav {
        display: flex;
        gap: 8px;
      }
      .nav-btn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: none;
        background: rgba(139,92,246,0.1);
        color: var(--secondary);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        padding: 0;
      }
      .nav-btn:hover {
        background: rgba(139,92,246,0.2);
      }
      .calendar-grid {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .calendar-weekdays {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .weekday {
        width: 36px;
        text-align: center;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        padding: 6px 0;
        box-sizing: border-box;
      }
      .calendar-days {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 4px;
      }
      .day-cell {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        box-sizing: border-box;
        padding: 0;
      }
      .day-cell.empty {
        cursor: default;
        pointer-events: none;
      }
      .day-cell:not(.empty):hover {
        background: rgba(139,92,246,0.2);
        transform: scale(1.05);
      }
      .day-cell.today {
        background: rgba(139,92,246,0.25);
        color: var(--secondary);
        font-weight: 700;
      }
      .day-cell.has-poop {
        background: rgba(139,92,246,0.12);
      }
      .day-cell.has-poop::after {
        content: '💩';
        position: absolute;
        bottom: 1px;
        right: 1px;
        font-size: 10px;
        line-height: 1;
        pointer-events: none;
      }
      .day-cell.has-pee::after {
        content: '💧';
        position: absolute;
        bottom: 1px;
        right: 1px;
        font-size: 10px;
        line-height: 1;
        pointer-events: none;
      }
      .day-cell.has-eat::after {
        content: '🍽️';
        position: absolute;
        bottom: 1px;
        right: 1px;
        font-size: 10px;
        line-height: 1;
        pointer-events: none;
      }
      .nav-btn.eat-nav:hover {
        background: rgba(245,158,11,0.2);
      }

      /* 吃页面日历样式 */
      #pageEat .day-cell.today {
        background: rgba(245,158,11,0.25);
        color: var(--eat);
      }
      #pageEat .day-cell.has-eat {
        background: rgba(245,158,11,0.12);
      }
      #pageEat .day-cell:not(.empty):hover {
        background: rgba(245,158,11,0.2);
      }
      #pageEat .calendar-header .calendar-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--eat);
      }
      #pageEat .nav-btn.eat-nav {
        background: rgba(245,158,11,0.1);
        color: var(--eat);
      }
      #pageEat .nav-btn.eat-nav:hover {
        background: rgba(245,158,11,0.2);
      }

      /* 撒页面日历样式 */
      #pagePee .day-cell.today {
        background: rgba(16,185,129,0.25);
        color: var(--pee);
      }
      #pagePee .day-cell.has-pee {
        background: rgba(16,185,129,0.12);
      }
      #pagePee .day-cell:not(.empty):hover {
        background: rgba(16,185,129,0.2);
      }
      #pagePee .calendar-header .calendar-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--pee);
      }
      #pagePee .nav-btn {
        background: rgba(16,185,129,0.1);
        color: var(--pee);
      }
      #pagePee .nav-btn:hover {
        background: rgba(16,185,129,0.2);
      }
      #pagePee .weekday {
        color: var(--pee);
      }

      /* 打卡卡片 */
      .checkin-card {
        background: rgba(255,255,255,0.7);
        border: 1px solid rgba(139,92,246,0.2);
        border-radius: 14px;
        padding: 14px;
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 16px rgba(139,92,246,0.1);
        margin-bottom: 12px;
      }
      .checkin-card.pee-card {
        border-color: rgba(16,185,129,0.2);
        box-shadow: 0 4px 16px rgba(16,185,129,0.1);
      }
      .checkin-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .checkin-input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(139,92,246,0.25);
        background: rgba(255,255,255,0.95);
        color: var(--text);
        outline: none;
        font: inherit;
        font-size: 13px;
      }
      .checkin-input.pee-input {
        border-color: rgba(16,185,129,0.25);
      }
      .checkin-input::placeholder {
        color: var(--muted);
      }
      .btn-poop {
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 13px;
        background: linear-gradient(135deg, var(--secondary), var(--secondary2));
        color: #fff;
        box-shadow: 0 4px 14px rgba(139,92,246,0.3);
        white-space: nowrap;
        border: none;
      }
      .btn-poop:hover { transform: translateY(-1px); }
      .btn-poop:active { transform: translateY(1px); }
      .btn-pee {
        background: linear-gradient(135deg, var(--pee), var(--pee2));
        box-shadow: 0 4px 14px rgba(16,185,129,0.3);
      }
      .btn-undo {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: rgba(139,92,246,0.1);
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
        margin-left: 8px;
      }
      .btn-undo:hover {
        background: rgba(139,92,246,0.2);
      }
      .btn-undo.pee-btn {
        background: rgba(16,185,129,0.1);
      }
      .btn-undo.pee-btn:hover {
        background: rgba(16,185,129,0.2);
      }
      .btn-toggle {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: none;
        background: rgba(139,92,246,0.1);
        color: var(--secondary);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        margin-left: auto;
        margin-right: 8px;
        flex-shrink: 0;
      }
      .btn-toggle:hover {
        background: rgba(139,92,246,0.2);
      }
      .btn-toggle.collapsed {
        transform: rotate(-90deg);
      }

      /* 今日打卡记录列表 */
      .today-records-section {
        margin-top: 14px;
        background: rgba(139,92,246,0.08);
        border-radius: 10px;
        overflow: hidden;
      }
      .today-records-section.pee-section {
        background: rgba(16,185,129,0.08);
      }
      .today-records-header {
        display: flex;
        align-items: center;
        padding: 10px 12px;
        cursor: pointer;
      }
      .today-records-header:hover {
        background: rgba(139,92,246,0.05);
      }
      .today-records-title {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--text);
      }
      .today-records-icon { font-size: 18px; }
      .today-records-title strong {
        font-weight: 700;
        color: var(--secondary);
      }
      .today-records-title strong.pee-count {
        color: var(--pee);
      }
      .today-records-list {
        max-height: 200px;
        overflow-y: auto;
        padding: 0 12px 12px;
      }
      .today-records-list.collapsed {
        display: none;
      }
      .record-item {
        display: flex;
        align-items: flex-start;
        padding: 8px 10px;
        background: rgba(255,255,255,0.6);
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .record-item:last-child {
        margin-bottom: 0;
      }
      .record-time {
        color: var(--secondary);
        font-weight: 600;
        min-width: 60px;
        flex-shrink: 0;
      }
      .record-time.pee-time {
        color: var(--pee);
      }
      .record-remark {
        color: var(--text);
        flex: 1;
        word-break: break-all;
      }

      /* 统计卡片 */
      .stats-card {
        background: rgba(255,255,255,0.7);
        border: 1px solid rgba(139,92,246,0.15);
        border-radius: 14px;
        padding: 14px;
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 16px rgba(139,92,246,0.08);
      }
      .stats-card.pee-stats {
        border-color: rgba(16,185,129,0.15);
        box-shadow: 0 4px 16px rgba(16,185,129,0.08);
      }
      .stats-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .stats-toggle {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }
      .stats-toggle-btn {
        flex: 1;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid rgba(139,92,246,0.2);
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .stats-toggle-btn.active {
        background: linear-gradient(135deg, var(--secondary), var(--secondary2));
        color: #fff;
        border-color: transparent;
      }
      .stats-toggle-btn.pee-toggle.active {
        background: linear-gradient(135deg, var(--pee), var(--pee2));
      }
      .stats-num {
        font-size: 32px;
        font-weight: 800;
        color: var(--secondary);
        text-align: center;
        line-height: 1;
      }
      .stats-num.pee-num {
        color: var(--pee);
      }
      .stats-label {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        margin-top: 4px;
      }

      /* 悬浮卡片 */
      .tooltip {
        position: fixed;
        z-index: 1000;
        display: none;
        opacity: 0;
        background: #fff;
        border-radius: 12px;
        padding: 12px 14px;
        min-width: 160px;
        max-width: 220px;
        box-shadow: 0 8px 32px rgba(12,42,77,0.18);
        pointer-events: none;
        transition: opacity 0.15s ease;
      }
      .tooltip.show { 
        display: block; 
        opacity: 1;
      }
      .tooltip-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(245,158,11,0.2);
      }
      .tooltip-date {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
      }
      .tooltip-poop-count {
        font-size: 12px;
        color: var(--secondary);
        font-weight: 600;
      }
      .tooltip-poop-count.pee-count {
        color: var(--pee);
      }
      .tooltip-poop-count.eat-count {
        color: var(--eat);
      }
      .tooltip-records {
        max-height: 120px;
        overflow-y: auto;
      }
      .tooltip-record {
        padding: 6px 0;
        font-size: 12px;
        border-bottom: 1px solid rgba(139,92,246,0.05);
      }
      .tooltip-record:last-child {
        border-bottom: none;
      }
      .tooltip-record-time {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 2px;
      }
      .tooltip-record-remark {
        color: var(--text);
        font-size: 12px;
      }
      .tooltip-empty {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        padding: 10px 0;
      }

      /* toast */
      .toast {
        position: fixed;
        bottom: 38px; left: 50%;
        transform: translateX(-50%) translateY(12px);
        opacity: 0;
        pointer-events: none;
        background: rgba(12,42,77,0.85);
        color: #fff;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 11px;
        transition: opacity 150ms ease, transform 150ms ease;
        white-space: nowrap;
        z-index: 200;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* 编辑弹窗 */
      .edit-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(12,42,77,0.5);
        z-index: 600;
        align-items: center;
        justify-content: center;
      }
      .edit-modal.show {
        display: flex;
      }
      .edit-modal-content {
        background: #fff;
        border-radius: 16px;
        width: 280px;
        max-height: 360px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(12,42,77,0.25);
      }
      .edit-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(12,42,77,0.1);
      }
      .edit-modal-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }
      .edit-modal-close {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: none;
        background: rgba(12,42,77,0.08);
        font-size: 18px;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .edit-modal-close:hover {
        background: rgba(12,42,77,0.15);
        color: var(--text);
      }
      .edit-modal-body {
        padding: 12px;
        max-height: 280px;
        overflow-y: auto;
      }
      .edit-record-item {
        background: rgba(12,42,77,0.04);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 8px;
      }
      .edit-record-item:last-child {
        margin-bottom: 0;
      }
      .edit-record-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .edit-record-time {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .edit-record-actions {
        display: flex;
        gap: 6px;
      }
      .edit-record-actions button {
        padding: 4px 10px;
        border-radius: 6px;
        border: none;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .edit-btn-edit {
        background: rgba(11,107,255,0.1);
        color: var(--primary);
      }
      .edit-btn-edit:hover {
        background: rgba(11,107,255,0.2);
      }
      .edit-btn-delete {
        background: rgba(239,68,68,0.1);
        color: #EF4444;
      }
      .edit-btn-delete:hover {
        background: rgba(239,68,68,0.2);
      }
      .edit-record-content {
        font-size: 12px;
        color: var(--muted);
        word-break: break-all;
      }
      .edit-input-row {
        margin-bottom: 8px;
      }
      .edit-input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(12,42,77,0.2);
        background: #fff;
        font: inherit;
        font-size: 12px;
        color: var(--text);
        outline: none;
      }
      .edit-input:focus {
        border-color: var(--primary);
      }
      .edit-save-btn {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: none;
        background: var(--primary);
        color: #fff;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      .edit-save-btn:hover {
        background: #0a5ce6;
      }
      .edit-type-select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(12,42,77,0.2);
        background: #fff;
        font: inherit;
        font-size: 12px;
        color: var(--text);
        outline: none;
        margin-bottom: 8px;
        cursor: pointer;
      }
      .edit-empty {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        padding: 20px 0;
      }
      .edit-empty.add-mode {
        color: var(--primary);
        font-weight: 600;
      }
    </style>
  </head>
  <body>

    <!-- ============ 吃 - 饮食记录页面 ============ -->
    <div class="page" id="pageEat">
      <div class="eat-header">
        <div class="eat-icon">🍽️</div>
        <div>
          <div class="eat-title">饮食记录</div>
          <div class="eat-sub">记录每日饮食，健康生活</div>
        </div>
      </div>

      <div class="card">
        <div class="calendar-header">
          <div class="calendar-title" id="eatCalendarTitle">2024年1月</div>
          <div class="calendar-nav">
            <button class="nav-btn eat-nav" id="eatPrevMonth">‹</button>
            <button class="nav-btn eat-nav" id="eatNextMonth">›</button>
          </div>
        </div>
        <div class="calendar-grid">
          <div class="calendar-weekdays">
            <div class="weekday">日</div>
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
          </div>
          <div class="calendar-days" id="eatCalendarDays"></div>
        </div>
      </div>

      <div class="card">
        <div class="meal-input-row">
          <select class="meal-type-select" id="mealType">
            <option value="breakfast">🌅 早餐</option>
            <option value="lunch">☀️ 午餐</option>
            <option value="dinner">🌙 晚餐</option>
            <option value="snack">🍪 加餐</option>
          </select>
          <input class="meal-input" id="mealInput" type="text" placeholder="今天吃了什么？" maxlength="100" />
        </div>
        <button class="btn-eat" id="addMealBtn">🍽️ 记录饮食</button>

        <div class="meal-records" id="mealRecords">
          <div class="meal-records-header" id="mealRecordsHeader">
            <span class="meal-records-title">
              📋 今日饮食 (<span id="mealCount">0</span> 条)
            </span>
            <span class="meal-toggle" id="mealToggle">▼</span>
          </div>
          <div class="meal-records-list" id="mealRecordsList"></div>
        </div>
      </div>
    </div>

    <!-- ============ 喝 - 喝水提醒页面 ============ -->
    <div class="page" id="pageDrink">
      <div class="header">
        <div class="cup-icon">🥤</div>
        <div>
          <div class="header-title">喝水提醒</div>
          <div class="header-sub">保持水分，状态更好。</div>
        </div>
      </div>

      <div class="card drink-card">
        <div class="card-label">距离下次喝水</div>
        <div class="timer paused" id="timer">--:--</div>
        <div class="next-hint" id="nextHint">提醒未开启</div>
        <div class="progress-wrap">
          <div class="progress-bar paused" id="progressBar" style="width:100%"></div>
        </div>
      </div>

      <div class="switch-row">
        <div class="switch-item">
          <div>
            <div class="switch-label">开始提醒</div>
            <div class="switch-sub" id="timerStatus">未开启</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="timerToggle" />
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
        <div class="switch-item">
          <div>
            <div class="switch-label">弹出通知</div>
            <div class="switch-sub" id="notifStatus">未开启</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="notifToggle" />
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>

      <div class="row">
        <span class="row-label">提醒间隔</span>
        <select id="intervalSelect">
          <option value="15">每 15 分钟</option>
          <option value="30" selected>每 30 分钟</option>
          <option value="45">每 45 分钟</option>
          <option value="60">每 60 分钟</option>
          <option value="custom">自定义…</option>
        </select>
      </div>

      <div class="custom-row" id="customRow">
        <span class="row-label">自定义</span>
        <input class="custom-input" id="customIntervalValue" type="number" min="1" max="720" step="1" placeholder="输入数值" />
        <select id="customIntervalUnit" class="custom-unit">
          <option value="seconds">秒</option>
          <option value="minutes" selected>分钟</option>
          <option value="hours">小时</option>
        </select>
        <button class="custom-apply" id="customApplyBtn" type="button">应用</button>
      </div>

      <div class="btns">
        <button class="btn-primary" id="drinkBtn" type="button" disabled>我喝了！</button>
        <button class="btn-secondary" id="resetBtn" type="button" disabled>重置倒计时</button>
      </div>

      <div class="drink-stats">
        <div class="drink-stat-item">
          <div class="drink-stat-num" id="drinkTodayCount">0</div>
          <div class="drink-stat-label">今日喝水(口)</div>
        </div>
        <div class="drink-stat-item">
          <div class="drink-stat-num" id="drinkWeekCount">0</div>
          <div class="drink-stat-label">本周累计(口)</div>
        </div>
      </div>
    </div>

    <!-- ============ 拉 - 排便打卡页面 ============ -->
    <div class="page" id="pagePoop">
      <div class="eat-header">
        <div class="eat-icon" style="background: linear-gradient(135deg, var(--secondary), var(--secondary2)); box-shadow: 0 4px 12px rgba(139,92,246,0.3);">💩</div>
        <div>
          <div class="eat-title">排便打卡</div>
          <div class="eat-sub">记录每日排便，肠道健康</div>
        </div>
      </div>

      <div class="checkin-card">
        <div class="calendar-header">
          <div class="calendar-title" id="poopCalendarTitle">2024年1月</div>
          <div class="calendar-nav">
            <button class="nav-btn poop-nav" id="poopPrevMonth">‹</button>
            <button class="nav-btn poop-nav" id="poopNextMonth">›</button>
          </div>
        </div>
        <div class="calendar-grid">
          <div class="calendar-weekdays">
            <div class="weekday">日</div>
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
          </div>
          <div class="calendar-days" id="poopCalendarDays"></div>
        </div>
      </div>

      <div class="checkin-card">
        <div class="checkin-row">
          <input class="checkin-input" id="poopRemarkInput" type="text" placeholder="添加备注（可选）" maxlength="50" />
          <button class="btn-poop" id="poopCheckinBtn">💩 打卡</button>
        </div>
        
        <div class="today-records-section" id="poopTodaySection" style="display:none;">
          <div class="today-records-header" id="poopRecordsHeader">
            <span class="today-records-title">
              <span class="today-records-icon">💩</span>
              今日已打卡 <strong id="poopTodayCount">0</strong> 次
            </span>
            <button class="btn-toggle" id="poopToggleBtn">▼</button>
            <button class="btn-undo" id="poopUndoBtn">↩️</button>
          </div>
          <div class="today-records-list" id="poopRecordsList"></div>
        </div>
      </div>

      <div class="stats-card">
        <div class="stats-title">累计统计</div>
        <div class="stats-toggle">
          <button class="stats-toggle-btn active" id="poopWeekBtn">本周</button>
          <button class="stats-toggle-btn" id="poopMonthBtn">本月</button>
        </div>
        <div class="stats-num" id="poopStatsCount">0</div>
        <div class="stats-label" id="poopStatsLabel">次</div>
      </div>
    </div>

    <!-- ============ 撒 - 排尿打卡页面 ============ -->
    <div class="page" id="pagePee">
      <div class="eat-header">
        <div class="eat-icon" style="background: linear-gradient(135deg, var(--pee), var(--pee2)); box-shadow: 0 4px 12px rgba(16,185,129,0.3);">💧</div>
        <div>
          <div class="eat-title">排尿打卡</div>
          <div class="eat-sub">记录每日排尿，泌尿健康</div>
        </div>
      </div>

      <div class="checkin-card pee-card">
        <div class="calendar-header">
          <div class="calendar-title" id="peeCalendarTitle">2024年1月</div>
          <div class="calendar-nav">
            <button class="nav-btn pee-nav" id="peePrevMonth">‹</button>
            <button class="nav-btn pee-nav" id="peeNextMonth">›</button>
          </div>
        </div>
        <div class="calendar-grid">
          <div class="calendar-weekdays">
            <div class="weekday">日</div>
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
          </div>
          <div class="calendar-days" id="peeCalendarDays"></div>
        </div>
      </div>

      <div class="checkin-card pee-card">
        <div class="checkin-row">
          <input class="checkin-input pee-input" id="peeRemarkInput" type="text" placeholder="添加备注（可选）" maxlength="50" />
          <button class="btn-poop btn-pee" id="peeCheckinBtn">💧 打卡</button>
        </div>
        
        <div class="today-records-section pee-section" id="peeTodaySection" style="display:none;">
          <div class="today-records-header" id="peeRecordsHeader">
            <span class="today-records-title">
              <span class="today-records-icon">💧</span>
              今日已打卡 <strong id="peeTodayCount" class="pee-count">0</strong> 次
            </span>
            <button class="btn-toggle" id="peeToggleBtn">▼</button>
            <button class="btn-undo pee-btn" id="peeUndoBtn">↩️</button>
          </div>
          <div class="today-records-list" id="peeRecordsList"></div>
        </div>
      </div>

      <div class="stats-card pee-stats">
        <div class="stats-title">累计统计</div>
        <div class="stats-toggle">
          <button class="stats-toggle-btn pee-toggle active" id="peeWeekBtn">本周</button>
          <button class="stats-toggle-btn pee-toggle" id="peeMonthBtn">本月</button>
        </div>
        <div class="stats-num pee-num" id="peeStatsCount">0</div>
        <div class="stats-label" id="peeStatsLabel">次</div>
      </div>
    </div>

    <!-- 悬浮卡片 -->
    <div class="tooltip" id="tooltip">
      <div class="tooltip-header">
        <span class="tooltip-date" id="tooltipDate">2024年1月1日</span>
        <span class="tooltip-poop-count" id="tooltipCount">💩 0次</span>
      </div>
      <div class="tooltip-records" id="tooltipRecords"></div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="edit-modal" id="editModal">
      <div class="edit-modal-content">
        <div class="edit-modal-header">
          <span class="edit-modal-title" id="editModalTitle">编辑记录</span>
          <button class="edit-modal-close" id="editModalClose">×</button>
        </div>
        <div class="edit-modal-body" id="editModalBody"></div>
      </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
      <div class="nav-dot eat active" id="navEat"></div>
      <div class="nav-dot drink" id="navDrink"></div>
      <div class="nav-dot poop" id="navPoop"></div>
      <div class="nav-dot pee" id="navPee"></div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="popup.js"></script>
  </body>
</html>
